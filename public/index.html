<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Build with AI - Google</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0f0f1a, #1a1a2e);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
    }

    .card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 560px;
      backdrop-filter: blur(10px);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 24px;
    }

    .logo span {
      font-size: 20px;
      font-weight: 700;
      background: linear-gradient(90deg, #4285F4, #EA4335, #FBBC05, #34A853);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    h1 {
      font-size: 24px;
      margin-bottom: 8px;
    }

    p.subtitle {
      color: #aaa;
      font-size: 14px;
      margin-bottom: 28px;
    }

    label {
      display: block;
      font-size: 13px;
      color: #ccc;
      margin-bottom: 8px;
    }

    textarea {
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.07);
      color: #fff;
      font-size: 15px;
      resize: vertical;
      min-height: 140px;
      outline: none;
      transition: border 0.3s;
    }

    textarea:focus {
      border-color: #4285F4;
    }

    .word-count {
      text-align: right;
      font-size: 12px;
      color: #888;
      margin-top: 6px;
      margin-bottom: 20px;
    }

    button {
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      border: none;
      background: linear-gradient(90deg, #4285F4, #34A853);
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.3s;
    }

    button:hover { opacity: 0.85; }

    #resultado {
      margin-top: 24px;
      padding: 16px;
      border-radius: 10px;
      font-size: 14px;
      display: none;
    }

    #resultado.exito {
      background: rgba(52, 168, 83, 0.15);
      border: 1px solid #34A853;
      color: #34A853;
    }

    #resultado.error {
      background: rgba(234, 67, 53, 0.15);
      border: 1px solid #EA4335;
      color: #EA4335;
    }

    pre {
      margin-top: 10px;
      font-size: 12px;
      white-space: pre-wrap;
      color: #ccc;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <span>🚀 Build with AI</span>
    </div>
    <h1>Envía tu propuesta de proyecto</h1>
    <p class="subtitle">Describe tu idea de proyecto con IA. Mínimo 10 palabras.</p>

    <label for="propuesta">Tu propuesta:</label>
    <textarea
      id="propuesta"
      placeholder="Ejemplo: Quiero crear un asistente de IA que ayude a estudiantes a organizar sus tareas escolares usando procesamiento de lenguaje natural..."
    ></textarea>
    <div class="word-count">Palabras: <span id="contador">0</span></div>

    <button onclick="enviar()">Enviar a Gemini API ✨</button>

    <div id="resultado"></div>
  </div>

  <script>
    const textarea = document.getElementById("propuesta");
    const contador = document.getElementById("contador");

    textarea.addEventListener("input", () => {
      const words = textarea.value.trim().split(/\s+/).filter(w => w.length > 0);
      contador.textContent = words.length;
    });

    async function enviar() {
      const propuesta = textarea.value;
      const resultado = document.getElementById("resultado");

      resultado.style.display = "none";

      try {
        const response = await fetch("/api/submit", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ propuesta })
        });

        const data = await response.json();

        if (response.ok) {
          resultado.className = "exito";
          resultado.innerHTML = `<strong>${data.mensaje}</strong><pre>${JSON.stringify(data.datos, null, 2)}</pre>`;
        } else {
          resultado.className = "error";
          resultado.innerHTML = `<strong>Error:</strong> ${data.error}`;
        }
      } catch (err) {
        resultado.className = "error";
        resultado.innerHTML = "Error de conexión con el servidor.";
      }

      resultado.style.display = "block";
    }
  </script>
</body>
</html>
